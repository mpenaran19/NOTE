<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1 style="cursor: pointer;" onclick="window.location.href='index.html'">🎵 Note</h1>
</header>

<section class="contenido">

    <h2>Bienvenido de nuevo</h2>
    <p>Accede con tu cuenta para continuar</p>

    <form onsubmit="return false;">
        <input type="email" id="loginCorreo" placeholder="Correo electrónico" required>
        <input type="password" id="loginPass" placeholder="Contraseña" required>

        <button type="button" onclick="iniciarSesion()">Entrar</button>





        <button type="button" class="secundario" onclick="window.location.href='register.html'">
            Crear cuenta nueva
        </button>
    </form>

</section>

<footer>
    © 2025 Note. Todos los derechos reservados.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const { createClient } = supabase;
    const _supabase = createClient(
        "https://lzhmxfxqekjuuicsqjqy.supabase.co", 
        "sb_publishable_sS1U60DiT1e9V8aPO50zDQ_G8EhZX1L"
    );

    async function iniciarSesion() {
        const email = document.getElementById('loginCorreo').value;
        const password = document.getElementById('loginPass').value;

        const { data, error } = await _supabase.auth.signInWithPassword({ 
            email: email, 
            password: password 
        });

        if (error) {
            alert("Error: " + error.message);
        } else {
            localStorage.setItem("logueado", "1");
            window.location.href = "cursos.html";
        }
    }
</script>

</body>
</html>
